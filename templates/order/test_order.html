<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Order Page, Delete THis Page After Test!!!</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin:40px;
        }

        h1{
            color:#333;
        }

        form{
            margin-bottom:20px;
            padding:15px;
            border:1px solid #ccc;
            width:400px;
        }

        input,select,button{
            margin-top:5px;
            margin-bottom:10px;
            padding:5px;
        }

        button{
            cursor:pointer;
        }

        .nav{
            margin-bottom:30px;
        }
    </style>
</head>

<body>

<h1>Test Order Page</h1>

<div class="nav">
    <a href="{% url 'order:order_list' %}">Order List</a> |
    <a href="{% url 'order:test_basket_page' %}">Basket Test Page</a>
</div>

<hr>

<h2>Create Order (Test)</h2>

<form method="post" action="{% url 'order:order_create' %}">
    {% csrf_token %}

    <label>Item ID:</label><br>
    <input type="number" name="item_id" required><br>

    <label>Quantity:</label><br>
    <input type="number" name="quantity" value="1" min="1"><br>

    <button type="submit">Create Order</button>
</form>

<p>
Note: This form calls <strong>order_create</strong>.
Since your backend returns JSON, the browser will display the JSON response after submission.
</p>

<hr>

<h2>Search Orders</h2>

<form method="get" action="{% url 'order:order_search' %}">

    <label>Keyword:</label><br>
    <input type="text" name="q" placeholder="order id / username / item title"><br>

    <label>Status:</label><br>
    <select name="status">
        <option value="">All</option>
        <option value="pending">Pending</option>
        <option value="paid">Paid</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
    </select><br>

    <button type="submit">Search</button>

</form>

</body>
</html>
