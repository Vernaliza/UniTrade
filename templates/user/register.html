{% extends "base.html" %}

{% block title %}Register - UniTrade{% endblock %}
{% load static %}
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/user.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <h2 class="auth-title">Create an Account</h2>
    
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="btn-publish btn-submit">Register</button>
    </form>

    <p style="text-align: center; margin-top: 25px; font-size: 14px; color: #666;">
        Already have an account? 
        <a href="{% url 'user:user_login' %}" style="color: #d86800; text-decoration: none; font-weight: bold;">Login here</a>
    </p>
</div>
{% endblock %}
