{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Verify Code</h2>
    <p>Please enter the verification code sent to your email.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Verify</button>
    </form>
</div>
{% endblock %}
