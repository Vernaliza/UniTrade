{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Forgot Password</h2>
    <p>Enter your registered email address to receive a verification code.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Send Code</button>
    </form>
</div>
{% endblock %}
