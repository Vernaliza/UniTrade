{% extends 'base.html' %}
{% load static %}

{% block title %}Forgot Password - UniTrade{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/user.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div style="font-size: 50px; text-align: center; margin-bottom: 20px;">🔍</div>
    <h2 class="auth-title">Forgot Password</h2>
    
    <p style="text-align: center; color: #666; margin-bottom: 25px; line-height: 1.5;">
        Enter your registered email address to receive a verification code.
    </p>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit" style="background-color: #d86800; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Send Code
        </button>
    </form>
</div>
{% endblock %}
